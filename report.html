<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report | Tejaskp AI Software</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .report-header {
            margin-bottom: 1.5rem;
        }
        .report-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: var(--text-main);
        }
        .report-header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .notifications-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .notification-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            transition: all 0.3s;
        }
        .notification-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(0, 242, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 242, 255, 0.1);
        }
        .notif-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .notif-subject {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .notif-time {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .notif-message {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.5;
        }
        .no-notifs {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--glass-border);
            border-radius: 16px;
        }
        .notif-badge {
            background: rgba(188, 19, 254, 0.1);
            color: var(--accent-purple);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            border: 1px solid rgba(188, 19, 254, 0.2);
        }
        .notif-badge.all {
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent-blue);
            border-color: rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <div class="bg-animation"></div>
    </div>

    <div class="dashboard-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <img src="logo.jpg" alt="Tejaskp AI Logo">
                </div>
                <h2>Tejaskp AI</h2>
            </div>
            
            <ul class="nav-links">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">
                        <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor;"><path d="M3,13H11V3H3V13M3,21H11V15H3V21M13,21H21V11H13V21M13,3V9H21V3H13Z"/></svg>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="calendar.html" class="nav-link">
                        <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor;"><path d="M14,14H7V16H14M19,19H5V8H19M19,3H18V1H16V3H8V1H6V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3M17,10H7V12H17V10Z"/></svg>
                        <span>Attendance</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="checkin.html" class="nav-link">
                        <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor;"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M16.2,16.2L11,13V7H12.5V12.2L17,14.9L16.2,16.2Z"/></svg>
                        <span>Check-In / Check-Out</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="leave.html" class="nav-link">
                        <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor;"><path d="M19,3H14.82C14.4,1.84 13.3,1 12,1C10.7,1 9.6,1.84 9.18,3H5C3.9,3 3,3.9 3,5V19C3,20.1 3.9,21 5,21H19C20.1,21 21,20.1 21,19V5C21,3.9 20.1,3 19,3M12,3A1,1 0 0,1 13,4A1,1 0 0,1 12,5A1,1 0 0,1 11,4A1,1 0 0,1 12,3M19,19H5V5H7V7H17V5H19V19M16.5,12L15.1,10.6L12,13.7L10.4,12.1L9,13.5L12,16.5L16.5,12Z"/></svg>
                        <span>Leave Requests</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="documents.html" class="nav-link">
                        <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor;"><path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M12.5,18H11.5V13.5H9L12,10.5L15,13.5H12.5V18M13,9V3.5L18.5,9H13Z"/></svg>
                        <span>Weekly Submission</span>
                    </a>
                </li>

                <li class="nav-item">
                    <a href="report.html" class="nav-link active">
                        <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor;"><path d="M13,9H11V7H13M13,17H11V11H13M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"/></svg>
                        <span>Report</span>
                    </a>
                </li>
                <li class="nav-item" id="adminNav" style="display:none">
                    <a href="admin.html" class="nav-link">
                        <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor;"><path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,11.99H19C18.47,16.11 15.72,19.78 12,20.93V12H5V6.3L12,3.19V11.99Z"/></svg>
                        <span>Admin Panel</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="settings.html" class="nav-link">
                        <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor;"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.68 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
                        <span>Settings</span>
                    </a>
                </li>
            </ul>
            <a href="#" class="nav-link logout" id="logoutBtnSidebar">
                <svg viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: currentColor;"><path d="M17,17.25V14H10V10H17V6.75L22.25,12L17,17.25M13,2A2,2 0 0,1 15,4V8H13V4H4V20H13V16H15V20A2,2 0 0,1 13,22H4A2,2 0 0,1 2,20V4A2,2 0 0,1 4,2H13Z"/></svg>
                <span>Logout</span>
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <nav class="navbar">
                <div></div>
                
                <div class="nav-right">
                    <div class="date-time">
                        <div class="current-time" id="currentTime">12:00 PM</div>
                        <div class="current-date" id="currentDate">Mon, Jan 1</div>
                    </div>
                    <div class="profile-sm" id="topProfilePhoto">
                        <svg viewBox="0 0 24 24" fill="var(--text-dim)" style="width: 100%; height: 100%;">
                            <path d="M12,4A4,4 0 0,1 16,8A4,4 0 0,1 12,12A4,4 0 0,1 8,8A4,4 0 0,1 12,4M12,14C16.42,14 20,15.79 20,18V20H4V18C4,15.79 7.58,14 12,14Z"/>
                        </svg>
                    </div>
                </div>
            </nav>

            <div class="report-header">
                <h2>Reports & Notifications</h2>
                <p>Important updates and messages from the Administration</p>
            </div>

            <!-- Notifications Feed -->
            <div class="notifications-container" id="notifFeed">
                <!-- Notifications will be loaded here -->
            </div>
            
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Clock & Date functionality
            const updateTime = () => {
                const now = new Date();
                document.getElementById('currentTime').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', {weekday: 'short', month: 'short', day: 'numeric'});
            };
            setInterval(updateTime, 1000);
            updateTime();

            // Session Verification & UI update
            const session = JSON.parse(localStorage.getItem('session') || sessionStorage.getItem('session'));
            if (!session) {
                window.location.href = 'index.html';
                return;
            }

            // Network Security Enforcer Check
            const verifyNetworkSecurely = () => {
                const authSSID = 'TEJASKP AI SOFTWARE_5G';
                const isAdmin = session && session.role === 'admin';
                if (isAdmin) return; // Admins bypass security checks

                fetch('/api/network')
                    .then(res => res.json())
                    .then(data => {
                        const curIP = data.ip || '127.0.0.1';
                        const curSSID = data.ssid || 'Disconnected';
                        const isAuthorized = curSSID === authSSID;

                        const existingOverlay = document.getElementById('networkSecurityDeniedOverlay');
                        if (isAuthorized) {
                            if (existingOverlay) existingOverlay.remove();
                            return;
                        }

                        if (!existingOverlay) {
                            const overlay = document.createElement('div');
                            overlay.id = 'networkSecurityDeniedOverlay';
                            overlay.className = 'network-denied-overlay';
                            overlay.innerHTML = `
                                <div style="background:rgba(8,12,20,0.95);border:1px solid rgba(255,255,255,0.08);padding:3rem;border-radius:24px;max-width:550px;box-shadow:0 20px 50px rgba(0,0,0,0.5);text-align:center">
                                    <span style="font-size:4rem;margin-bottom:1.5rem;display:inline-block">🛡️</span>
                                    <h2 style="font-size:1.8rem;font-weight:700;margin-bottom:1rem;color:var(--error-red)">Access Denied: Security Alert</h2>
                                    <p style="color:var(--text-dim);line-height:1.6;margin-bottom:1.5rem">
                                        This portal is restricted. Your device is connected to an unauthorized network. Please connect to the company's private Wi-Fi.
                                    </p>
                                    <div style="text-align:left;background:rgba(0,0,0,0.3);padding:1rem;border-radius:12px;border:1px solid var(--glass-border);font-size:0.9rem;margin-bottom:1.5rem">
                                        <div style="display:flex;justify-content:space-between;margin-bottom:0.4rem"><span>Required Wi-Fi SSID:</span><strong style="color:var(--accent-blue)">${authSSID}</strong></div>
                                        <div style="display:flex;justify-content:space-between;border-top:1px dashed rgba(255,255,255,0.1);padding-top:0.4rem;margin-top:0.4rem"><span>Your Connected Wi-Fi:</span><strong style="color:var(--error-red)" id="overlayYourSSID">${curSSID}</strong></div>
                                    </div>
                                    <button onclick="window.location.href='index.html'" class="btn btn-primary" style="max-width:180px">Return to Login</button>
                                </div>
                            `;
                            document.body.appendChild(overlay);
                        } else {
                            document.getElementById('overlayYourSSID').textContent = curSSID;
                            document.getElementById('overlayYourIP').textContent = curIP;
                        }
                    })
                    .catch(err => {
                        console.error("Network check error:", err);
                        const existingOverlay = document.getElementById('networkSecurityDeniedOverlay');
                        if (!existingOverlay) {
                            const overlay = document.createElement('div');
                            overlay.id = 'networkSecurityDeniedOverlay';
                            overlay.className = 'network-denied-overlay';
                            overlay.innerHTML = `
                                <div style="background:rgba(8,12,20,0.95);border:1px solid rgba(255,255,255,0.08);padding:3rem;border-radius:24px;max-width:550px;box-shadow:0 20px 50px rgba(0,0,0,0.5);text-align:center">
                                    <span style="font-size:4rem;margin-bottom:1.5rem;display:inline-block">⚠️</span>
                                    <h2 style="font-size:1.8rem;font-weight:700;margin-bottom:1rem;color:var(--error-red)">Security Connection Required</h2>
                                    <p style="color:var(--text-dim);line-height:1.6;margin-bottom:1.5rem">
                                        Could not verify your local network status. Please run the secure portal server using:
                                    </p>
                                    <code style="display:block;background:black;padding:1rem;border-radius:8px;color:#00ff00;font-family:monospace;margin-bottom:1.5rem">node start-portal.js</code>
                                    <p style="color:var(--text-dim);font-size:0.85rem">
                                        Access is restricted to verify correct Wi-Fi connectivity.
                                    </p>
                                </div>
                            `;
                            document.body.appendChild(overlay);
                        }
                    });
            };
            verifyNetworkSecurely();
            setInterval(verifyNetworkSecurely, 5000);



            if (session.photo) {
                document.getElementById('topProfilePhoto').innerHTML = `<img src="${session.photo}" alt="Profile">`;
            }

            // Admin Link Visibility
            if (session.role === 'admin') {
                document.getElementById('adminNav').style.display = 'block';
            }

            // Load Notifications
            const loadNotifications = () => {
                const allNotifs = JSON.parse(localStorage.getItem('admin_notifications') || '[]');
                const myNotifs = allNotifs.filter(n => n.to === 'all' || n.to === session.email);
                
                const feed = document.getElementById('notifFeed');
                
                if (myNotifs.length === 0) {
                    feed.innerHTML = `
                        <div class="no-notifs">
                            <svg viewBox="0 0 24 24" style="width: 48px; height: 48px; fill: var(--text-dim); margin-bottom: 1rem;"><path d="M12,22A2,2 0 0,0 14,20H10A2,2 0 0,0 12,22M18,16V11C18,7.93 16.36,5.36 13.5,4.68V4A1.5,1.5 0 0,0 12,2.5A1.5,1.5 0 0,0 10.5,4V4.68C7.63,5.36 6,7.92 6,11V16L4,18V19H20V18L18,16Z"/></svg>
                            <h3>No new notifications</h3>
                            <p>You're all caught up!</p>
                        </div>
                    `;
                    return;
                }

                feed.innerHTML = '';
                myNotifs.forEach(n => {
                    const date = new Date(n.time);
                    const isAll = n.to === 'all';
                    const badge = isAll 
                        ? `<span class="notif-badge all">BROADCAST</span>` 
                        : `<span class="notif-badge">DIRECT</span>`;
                        
                    const notifHtml = `
                        <div class="notification-card">
                            <div class="notif-top">
                                <div class="notif-subject">
                                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:var(--accent-blue)"><path d="M20,4H4C2.89,4 2,4.89 2,6V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V6C22,4.89 21.1,4 20,4M20,8L12,13L4,8V6L12,11L20,6V8Z"/></svg>
                                    ${n.subject}
                                    ${badge}
                                </div>
                                <div class="notif-time">${date.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
                            </div>
                            <div class="notif-message">
                                ${n.message.replace(/\n/g, '<br>')}
                            </div>
                        </div>
                    `;
                    feed.insertAdjacentHTML('beforeend', notifHtml);
                });
            };

            loadNotifications();

            // Logout
            document.getElementById('logoutBtnSidebar').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('session');
                sessionStorage.removeItem('session');
                window.location.href = 'index.html';
            });

        });
    </script>
</body>
</html>
